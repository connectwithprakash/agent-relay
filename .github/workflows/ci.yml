name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --include=dev
      - name: Run tests
        working-directory: frontend
        run: NODE_ENV=development npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install SDK
        working-directory: sdk
        run: pip install -e ".[dev]"
      - name: Run SDK tests
        working-directory: sdk
        run: pytest tests/ -v

  mcp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install MCP server
        working-directory: mcp-server
        run: pip install -e ".[dev]"
      - name: Run MCP tests
        working-directory: mcp-server
        run: pytest tests/ -v

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Verify PostgreSQL migration and rollback path
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://relay:relay@localhost:5432/relay
        run: |
          alembic upgrade head
          alembic downgrade 011
          alembic upgrade head

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build and start the production-like stack
        env:
          POSTGRES_PASSWORD: ci-only-password
          BACKEND_PORT: "18000"
          FRONTEND_PORT: "13000"
        run: docker compose up --build --wait
      - name: Probe backend and frontend
        run: |
          curl --fail --show-error http://localhost:18000/health
          curl --fail --show-error --head http://localhost:13000/
      - name: Show logs on failure
        if: failure()
        env:
          POSTGRES_PASSWORD: ci-only-password
        run: docker compose logs --no-color
      - name: Tear down stack
        if: always()
        env:
          POSTGRES_PASSWORD: ci-only-password
          BACKEND_PORT: "18000"
          FRONTEND_PORT: "13000"
        run: docker compose down --volumes
