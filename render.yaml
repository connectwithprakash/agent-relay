# Render.com deployment configuration for Agent Relay
services:
  - type: web
    name: agent-relay-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --require-hashes -r requirements.lock
    startCommand: sh -c 'alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port "$PORT"'
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    plan: free
